<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern User Directory</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #ffffff; color: #333; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        .search-container { width: 100%; max-width: 600px; margin-bottom: 40px; }
        #searchBar { width: 100%; padding: 18px 25px; border: 2px solid #f0f0f0; border-radius: 30px; outline: none; font-size: 16px; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        #searchBar:focus { border-color: #007bff; box-shadow: 0 10px 20px rgba(0,123,255,0.1); }
        .user-card { background: #ffffff; padding: 20px 25px; margin: 10px 0; border-radius: 20px; width: 100%; max-width: 600px; border: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .user-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.08); }
        .name { font-weight: 600; font-size: 18px; }
        .balance { color: #555; font-weight: 500; background: #f4f4f4; padding: 5px 12px; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="search-container">
        <input type="text" id="searchBar" placeholder="Search users by name..." onkeyup="filterUsers()">
    </div>

    <div id="userList" style="width: 100%; max-width: 600px;"></div>

    <script>
        const users = [
            { name: "TAHA MUJTABA", balance: "10 million.mt" },
            { name: "MUHAMMAD TAQI", balance: "500,000.tm" },
            { name: "ALI AHMED", balance: "25,000.md" },
            { name: "SARA KHAN", balance: "1.2 million.ans" },
            { name: "HAMZA BUTT", balance: "800,000.th" },
            { name: "FATIMA ZAHRA", balance: "2 million.mt" },
            { name: "USMAN MALIK", balance: "450,000.tm" },
            { name: "ZM", balance: "90,000.md" },
            { name: "BILAL HASSAN", balance: "3.5 million.ans" },
            { name: "AYESHA NOOR", balance: "600,000.th" },
            { name: "OMAR FAROOQ", balance: "1.5 million.mt" },
            { name: "MARIA KHAN", balance: "120,000.tm" }
        ];

        function displayUsers(filter = "") {
            const list = document.getElementById("userList");
            list.innerHTML = "";
            users.filter(u => u.name.toLowerCase().includes(filter.toLowerCase())).forEach(u => {
                list.innerHTML += `
                    <div class="user-card">
                        <span class="name">${u.name}</span>
                        <span class="balance">${u.balance}</span>
                    </div>`;
            });
        }

        function filterUsers() {
            displayUsers(document.getElementById("searchBar").value);
        }

        // Copy function request
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => alert("Copied: " + text));
        }

        displayUsers();
    </script>
</body>
</html>
