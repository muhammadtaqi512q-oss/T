name: Generate and Deploy No-Login Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. HTML File Generation
      - name: Create index.html
        run: |
          cat << 'EOF' > index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>My Simple Data Saver</title>
              <link rel="stylesheet" href="style.css">
          </head>
          <body>
              <div class="container">
                  <h2>My Personal Notes (No Login)</h2>
                  <p class="subtitle">Data aap ke hi browser mein save rahega!</p>
                  
                  <div class="input-area">
                      <input type="text" id="noteInput" placeholder="Yahan kuch bhi likhein...">
                      <button id="saveBtn">Save Note</button>
                  </div>

                  <h3>Saved Notes:</h3>
                  <ul id="notesList"></ul>
              </div>

              <script src="script.js"></script>
          </body>
          </html>
          EOF

      # 2. CSS File Generation
      - name: Create style.css
        run: |
          cat << 'EOF' > style.css
          body {
              font-family: 'Segoe UI', sans-serif;
              background-color: #121212;
              color: #ffffff;
              display: flex;
              justify-content: center;
              align-items: center;
              min-height: 100vh;
              margin: 0;
          }

          .container {
              background: #1e1e1e;
              padding: 30px;
              border-radius: 12px;
              box-shadow: 0 8px 24px rgba(0,0,0,0.3);
              width: 100%;
              max-width: 450px;
          }

          h2 {
              margin-top: 0;
              color: #00adb5;
          }

          .subtitle {
              color: #888;
              font-size: 14px;
              margin-bottom: 20px;
          }

          .input-area {
              display: flex;
              gap: 10px;
              margin-bottom: 20px;
          }

          input {
              flex: 1;
              padding: 12px;
              border-radius: 6px;
              border: 1px solid #333;
              background: #252525;
              color: white;
              font-size: 16px;
          }

          input:focus {
              outline: none;
              border-color: #00adb5;
          }

          button {
              background-color: #00adb5;
              color: white;
              border: none;
              padding: 12px 18px;
              border-radius: 6px;
              cursor: pointer;
              font-weight: bold;
              font-size: 16px;
          }

          button:hover {
              background-color: #008c9e;
          }

          ul {
              list-style-type: none;
              padding: 0;
              max-height: 250px;
              overflow-y: auto;
              margin: 0;
          }

          li {
              background: #2d2d2d;
              padding: 12px;
              margin-bottom: 8px;
              border-radius: 6px;
              display: flex;
              justify-content: space-between;
              align-items: center;
              border-left: 4px solid #00adb5;
              word-break: break-all;
          }

          .delete-btn {
              background: transparent;
              color: #ff5252;
              border: none;
              cursor: pointer;
              font-size: 16px;
              padding: 0 5px;
          }

          .delete-btn:hover {
              color: #ff1a1a;
          }
          EOF

      # 3. JavaScript File Generation (LocalStorage logic)
      - name: Create script.js
        run: |
          cat << 'EOF' > script.js
          document.addEventListener("DOMContentLoaded", () => {
              const noteInput = document.getElementById("noteInput");
              const saveBtn = document.getElementById("saveBtn");
              const notesList = document.getElementById("notesList");

              // Browser ki LocalStorage se purana data nikalna
              let savedNotes = JSON.parse(localStorage.getItem("myNotes")) || [];
              displayNotes();

              // Data save karne ka function
              saveBtn.addEventListener("click", () => {
                  const noteText = noteInput.value.trim();
                  if (noteText === "") return;

                  savedNotes.push(noteText);
                  localStorage.setItem("myNotes", JSON.stringify(savedNotes)); // Browser storage mein save kiya
                  
                  noteInput.value = ""; // Input box khali kiya
                  displayNotes();
              });

              // Notes ko UI par dikhane ka function
              function displayNotes() {
                  notesList.innerHTML = "";
                  savedNotes.forEach((note, index) => {
                      const li = document.createElement("li");
                      li.innerHTML = `
                          <span>${note}</span>
                          <button class="delete-btn" onclick="deleteNote(${index})">❌</button>
                      `;
                      notesList.appendChild(li);
                  });
              }

              // Data delete karne ka function
              window.deleteNote = function(index) {
                  savedNotes.splice(index, 1);
                  localStorage.setItem("myNotes", JSON.stringify(savedNotes)); // Browser storage update ki
                  displayNotes();
              };
          });
          EOF

      # 4. Dummy data.json (Aap ki requirement ke mutabiq background mein majood rahegi)
      - name: Create data.json
        run: |
          cat << 'EOF' > data.json
          {
              "info": "This site uses LocalStorage to save data directly in the browser without a login system."
          }
          EOF

      # 5. Files ko automatic aap ki main branch mein push karna
      - name: Commit & Push Generated Files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add index.html style.css script.js data.json
          git diff-index --quiet HEAD || git commit -m "Automated: Setup complete ready-to-run website"
          git push origin main
        continue-on-error: true

      # 6. Site ko GitHub Pages par publish karna
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
